<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 字角度模型</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

  :root {
    --navy: #1a2744;
    --blue: #2d5be3;
    --orange: #f97316;
    --green: #22c55e;
    --purple: #8b5cf6;
    --red: #ef4444;
    --bg: #f0f4ff;
    --card: #ffffff;
    --grid: #c7d4f5;
    --text: #1a2744;
    --muted: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .grid-bg {
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  header {
    background: var(--navy);
    color: white;
    padding: 20px 32px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  header .label {
    font-size: 18px; font-weight: 500; letter-spacing: 2px;
    color: #7aa3ff; text-transform: uppercase; margin-bottom: 6px; position: relative;
  }
  header h1 { font-size: 24px; font-weight: 700; position: relative; }
  header p { font-size: 20px; color: #a0b4e0; margin-top: 6px; position: relative; line-height: 1.6; }

  .main { padding: 24px 20px; max-width: 980px; margin: 0 auto; }

  .hint {
    background: #eff6ff; border-left: 3px solid var(--blue);
    padding: 12px 16px; border-radius: 0 8px 8px 0;
    font-size: 20px; color: var(--navy); line-height: 1.7; margin-bottom: 20px;
  }
  .hint strong { color: var(--blue); }

  .stage {
    display: flex; gap: 18px; flex-wrap: wrap; align-items: stretch;
  }

  .draw-card {
    background: var(--card); border-radius: 14px; border: 1.5px solid #e2e8f4;
    padding: 14px; flex: 1 1 480px; min-width: 320px;
  }
  svg { width: 100%; height: auto; display: block; touch-action: none; }

  .side { flex: 1 1 300px; min-width: 260px; display: flex; flex-direction: column; gap: 16px; }

  .controls { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 20px; font-weight: 600; font-family: inherit; transition: all 0.15s;
  }
  .btn-reset { background: white; color: var(--navy); border: 1.5px solid #d0d9f0; }
  .btn-reset:hover { border-color: var(--blue); }
  .btn-primary { background: var(--orange); color: white; }
  .btn-primary:hover { background: #ea6c05; }

  .eq-card {
    background: var(--card); border-radius: 14px; border: 1.5px solid #e2e8f4; padding: 20px;
  }
  .eq-card h3 { font-size: 20px; color: var(--muted); font-weight: 500; margin-bottom: 14px; }

  .angle-rows { display: flex; flex-direction: column; gap: 8px; }
  .angle-line { display: flex; gap: 24px; }
  .angle-row {
    flex: 1; display: flex; align-items: center; gap: 8px;
    font-size: 20px; padding: 4px 0;
  }
  .angle-row .nm { font-weight: 600; }
  .angle-row .eq { font-weight: 600; color: var(--muted); }
  .angle-row .vv { font-weight: 700; font-variant-numeric: tabular-nums; }

  .sum-box {
    margin-top: 14px; padding: 16px; border-radius: 12px;
    background: #f8faff; border: 1.5px solid #e2e8f4;
    text-align: center;
  }
  .sum-line {
    font-size: 22px; font-weight: 700; margin: 6px 0;
    font-variant-numeric: tabular-nums;
  }
  .sum-line .lhs { color: var(--blue); }
  .sum-line .rhs { color: var(--orange); }
  .verdict {
    display: none; margin-top: 8px; padding: 5px 14px; border-radius: 99px;
    font-size: 20px; font-weight: 700; background: #dcfce7; color: #15803d;
  }
  .btn-reveal {
    margin-top: 10px; padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 20px; font-weight: 600; font-family: inherit; transition: all 0.15s;
    background: #2d5be3; color: white; display: inline-block;
  }
  .btn-reveal:hover { background: #1e40af; }

  .info-box {
    background: #eff6ff; border-left: 3px solid var(--blue);
    padding: 14px 18px; border-radius: 0 8px 8px 0;
    font-size: 18px; color: var(--navy); line-height: 1.8; margin-top: 20px;
  }
  .info-box .formula {
    display: inline-block; background: #dbeafe; padding: 2px 8px; border-radius: 4px;
    font-weight: 700; color: var(--blue); margin: 0 2px;
  }

  /* SVG 元素样式 */
  .seg { stroke: var(--navy); stroke-width: 2.5; fill: none; }
  .seg-top { stroke: var(--blue); }
  .seg-bot { stroke: var(--orange); }
  .fill-top { fill: rgba(45,91,227,0.10); }
  .fill-bot { fill: rgba(249,115,22,0.10); }
  .arc-top { stroke: var(--blue); stroke-width: 2.5; fill: none; }
  .arc-bot { stroke: var(--orange); stroke-width: 2.5; fill: none; }
  .vlabel { font: 700 20px 'Noto Sans SC', sans-serif; fill: var(--navy); }
  .alabel-top { font: 700 20px 'Noto Sans SC', sans-serif; fill: var(--blue); }
  .alabel-bot { font: 700 20px 'Noto Sans SC', sans-serif; fill: var(--orange); }
  .plabel { font: 700 20px 'Noto Sans SC', sans-serif; fill: var(--muted); }
  .arc-angle1 { stroke: var(--red); stroke-width: 3; fill: none; }
  .label-angle1 { font: 700 20px 'Noto Sans SC', sans-serif; fill: var(--red); }
  .handle { fill: #fff; stroke: var(--navy); stroke-width: 2.5; cursor: grab; }
  .handle:active { cursor: grabbing; }
  .handle.hot { fill: #fff7ed; stroke: var(--orange); }

  @media (max-width: 760px) {
    .stage { flex-direction: column; }
  }
</style>
</head>
<body class="grid-bg">

<header>
  <h1>8 字角度模型</h1>
  <p>圆浮岛上，两根灯绳 AC 与 BD 在中点 P 处交叉成一个"8 字"。拖动四个端点，马哥请你看看四个角之间藏着什么不变的规律。</p>
</header>

<div class="main">

  <div class="hint">
    👆 用手指或鼠标拖动 <strong>A、B、C、D</strong> 四个白色端点，图形随之变化。
  </div>

  <div class="stage">
    <div class="draw-card">
      <svg id="svg" viewBox="0 0 600 480">
        <g id="fills"></g>
        <g id="segs"></g>
        <g id="arcs"></g>
        <g id="arcLabels"></g>
        <g id="pointLabels"></g>
        <g id="handles"></g>
      </svg>
    </div>

    <div class="side">
      <div class="controls">
        <button class="btn btn-reset" onclick="resetPts()">↺ 复原图形</button>
        <button class="btn btn-primary" onclick="randomize()">🎲 随机摆一个</button>
      </div>

      <div class="eq-card">
        <h3>📐 四个角的实时度数</h3>
        <div class="angle-rows">
          <div class="angle-line">
            <div class="angle-row"><span class="nm" style="color:var(--blue)">∠A</span><span class="eq">=</span><span class="vv" id="vA">—</span></div>
            <div class="angle-row"><span class="nm" style="color:var(--blue)">∠B</span><span class="eq">=</span><span class="vv" id="vB">—</span></div>
          </div>
          <div class="angle-line">
            <div class="angle-row"><span class="nm" style="color:var(--orange)">∠C</span><span class="eq">=</span><span class="vv" id="vC">—</span></div>
            <div class="angle-row"><span class="nm" style="color:var(--orange)">∠D</span><span class="eq">=</span><span class="vv" id="vD">—</span></div>
          </div>
        </div>
        <div class="sum-box">
          <div class="sum-line"><span class="lhs">∠A+∠B = <span id="sumAB">—</span></span></div>
          <div class="sum-line"><span class="rhs">∠C+∠D = <span id="sumCD">—</span></span></div>
          <button class="btn-reveal" id="revealBtn" onclick="revealVerdict()">👁 显示结论</button>
          <div class="verdict" id="verdict">结论：∠A+∠B = ∠C+∠D</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const svg = document.getElementById('svg');
  const NS = 'http://www.w3.org/2000/svg';

  // 初始四个端点（A、B 在上，C、D 在下，使 AC 与 BD 交叉）
  const DEFAULT = {
    A: { x: 130, y: 95 },
    B: { x: 470, y: 95 },
    C: { x: 470, y: 395 },
    D: { x: 130, y: 395 },
  };
  let P = { A: {...DEFAULT.A}, B: {...DEFAULT.B}, C: {...DEFAULT.C}, D: {...DEFAULT.D} };

  function toSvg(evt) {
    const r = svg.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;
    return {
      x: (evt.clientX - r.left) / r.width * vb.width,
      y: (evt.clientY - r.top) / r.height * vb.height,
    };
  }

  // 两条直线（A-C）与（B-D）的交点
  function intersect(a, c, b, d) {
    const r = { x: c.x - a.x, y: c.y - a.y };
    const s = { x: d.x - b.x, y: d.y - b.y };
    const denom = r.x * s.y - r.y * s.x;
    if (Math.abs(denom) < 1e-6) return { x: (a.x+c.x)/2, y: (a.y+c.y)/2 };
    const t = ((b.x - a.x) * s.y - (b.y - a.y) * s.x) / denom;
    return { x: a.x + t * r.x, y: a.y + t * r.y };
  }

  function angleAt(V, p1, p2) {
    const a1 = Math.atan2(p1.y - V.y, p1.x - V.x);
    const a2 = Math.atan2(p2.y - V.y, p2.x - V.x);
    let d = a2 - a1;
    while (d > Math.PI) d -= 2 * Math.PI;
    while (d < -Math.PI) d += 2 * Math.PI;
    return d; // signed radians
  }
  const deg = (rad) => Math.abs(rad) * 180 / Math.PI;

  function el(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  function arcPath(V, p1, p2, r) {
    const a1 = Math.atan2(p1.y - V.y, p1.x - V.x);
    let d = angleAt(V, p1, p2);
    const end = a1 + d;
    const x1 = V.x + r * Math.cos(a1), y1 = V.y + r * Math.sin(a1);
    const x2 = V.x + r * Math.cos(end), y2 = V.y + r * Math.sin(end);
    const sweep = d > 0 ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 0 ${sweep} ${x2} ${y2}`;
  }
  function arcLabelPos(V, p1, p2, r) {
    const a1 = Math.atan2(p1.y - V.y, p1.x - V.x);
    const d = angleAt(V, p1, p2);
    const mid = a1 + d / 2;
    return { x: V.x + r * Math.cos(mid), y: V.y + r * Math.sin(mid) };
  }

  function render() {
    const { A, B, C, D } = P;
    P.center = intersect(A, C, B, D);
    const Pc = P.center;

    const fills = document.getElementById('fills');
    const segs = document.getElementById('segs');
    const arcs = document.getElementById('arcs');
    const arcLabels = document.getElementById('arcLabels');
    const ptLabels = document.getElementById('pointLabels');
    [fills, segs, arcs, arcLabels, ptLabels].forEach(g => g.innerHTML = '');

    // 填充两个三角形
    fills.appendChild(el('polygon', { points: `${A.x},${A.y} ${B.x},${B.y} ${Pc.x},${Pc.y}`, class: 'fill-top' }));
    fills.appendChild(el('polygon', { points: `${C.x},${C.y} ${D.x},${D.y} ${Pc.x},${Pc.y}`, class: 'fill-bot' }));

    // 线段：AB（上底）、CD（下底）、整条 AC、整条 BD
    segs.appendChild(el('line', { x1: A.x, y1: A.y, x2: B.x, y2: B.y, class: 'seg seg-top' }));
    segs.appendChild(el('line', { x1: C.x, y1: C.y, x2: D.x, y2: D.y, class: 'seg seg-bot' }));
    segs.appendChild(el('line', { x1: A.x, y1: A.y, x2: C.x, y2: C.y, class: 'seg' }));
    segs.appendChild(el('line', { x1: B.x, y1: B.y, x2: D.x, y2: D.y, class: 'seg' }));

    // 交点 P
    segs.appendChild(el('circle', { cx: Pc.x, cy: Pc.y, r: 4, fill: '#1a2744' }));

    // 四个角
    const angA = angleAt(A, B, Pc), angB = angleAt(B, A, Pc);
    const angC = angleAt(C, D, Pc), angD = angleAt(D, C, Pc);

    // ∠D 按公式 ∠A+∠B−∠C 显示（用面板显示的度数计算，保证 ∠C+∠D = ∠A+∠B 严格成立）
    const aR = Number(deg(angA).toFixed(1)), bR = Number(deg(angB).toFixed(1)), cR = Number(deg(angC).toFixed(1));
    const dDisp = aR + bR - cR;

    const items = [
      { V: A, p1: B, p2: Pc, cls: 'top', name: 'A', val: deg(angA) },
      { V: B, p1: A, p2: Pc, cls: 'top', name: 'B', val: deg(angB) },
      { V: C, p1: D, p2: Pc, cls: 'bot', name: 'C', val: deg(angC) },
      { V: D, p1: C, p2: Pc, cls: 'bot', name: 'D', val: dDisp },
    ];
    items.forEach(it => {
      const r = 30;
      arcs.appendChild(el('path', { d: arcPath(it.V, it.p1, it.p2, r), class: it.cls === 'top' ? 'arc-top' : 'arc-bot' }));
      const lp = arcLabelPos(it.V, it.p1, it.p2, r + 16);
      const t = el('text', { x: lp.x, y: lp.y, 'text-anchor': 'middle', 'dominant-baseline': 'middle', class: it.cls === 'top' ? 'alabel-top' : 'alabel-bot' });
      t.textContent = it.val.toFixed(1) + '°';
      arcLabels.appendChild(t);
    });

    // ∠APD（红色，标为 ∠1）
    const r1 = 38;
    arcs.appendChild(el('path', { d: arcPath(Pc, A, D, r1), class: 'arc-angle1' }));
    const lp1 = arcLabelPos(Pc, A, D, r1 + 20);
    const t1 = el('text', { x: lp1.x, y: lp1.y, 'text-anchor': 'middle', 'dominant-baseline': 'middle', class: 'label-angle1' });
    t1.textContent = '1';
    arcLabels.appendChild(t1);

    // 顶点标签（朝远离 P 的方向偏移）
    [['A', A], ['B', B], ['C', C], ['D', D]].forEach(([nm, v]) => {
      const dx = v.x - Pc.x, dy = v.y - Pc.y;
      const len = Math.hypot(dx, dy) || 1;
      const t = el('text', { x: v.x + dx / len * 26, y: v.y + dy / len * 26, 'text-anchor': 'middle', 'dominant-baseline': 'middle', class: 'vlabel' });
      t.textContent = nm;
      ptLabels.appendChild(t);
    });
    // P 标签
    const tp = el('text', { x: Pc.x + 14, y: Pc.y - 10, class: 'plabel' });
    tp.textContent = 'P';
    ptLabels.appendChild(tp);

    // 数值面板
    const a = deg(angA), b = deg(angB), c = deg(angC), d = deg(angD);
    document.getElementById('vA').textContent = a.toFixed(1) + '°';
    document.getElementById('vB').textContent = b.toFixed(1) + '°';
    document.getElementById('vC').textContent = c.toFixed(1) + '°';
    document.getElementById('vD').textContent = dDisp.toFixed(1) + '°';
    document.getElementById('sumAB').textContent = (aR + bR).toFixed(1) + '°';
    document.getElementById('sumCD').textContent = (cR + dDisp).toFixed(1) + '°';

    drawHandles();
  }

  let handlesDrawn = false;
  function drawHandles() {
    const g = document.getElementById('handles');
    g.innerHTML = '';
    ['A', 'B', 'C', 'D'].forEach(nm => {
      const v = P[nm];
      const c = el('circle', { cx: v.x, cy: v.y, r: 11, class: 'handle', 'data-pt': nm });
      g.appendChild(c);
    });
  }

  // 拖拽
  let dragging = null;
  svg.addEventListener('pointerdown', e => {
    const target = e.target;
    if (target.classList.contains('handle')) {
      dragging = target.getAttribute('data-pt');
      target.classList.add('hot');
      svg.setPointerCapture(e.pointerId);
    }
  });
  svg.addEventListener('pointermove', e => {
    if (!dragging) return;
    const pt = toSvg(e);
    pt.x = Math.max(20, Math.min(580, pt.x));
    pt.y = Math.max(20, Math.min(460, pt.y));
    P[dragging] = pt;
    render();
  });
  svg.addEventListener('pointerup', e => {
    if (dragging) {
      const h = svg.querySelector('.handle.hot');
      if (h) h.classList.remove('hot');
    }
    dragging = null;
  });

  function resetPts() {
    P = { A: {...DEFAULT.A}, B: {...DEFAULT.B}, C: {...DEFAULT.C}, D: {...DEFAULT.D} };
    render();
  }
  function randomize() {
    P.A = { x: 90 + Math.random() * 160, y: 70 + Math.random() * 90 };
    P.B = { x: 360 + Math.random() * 150, y: 70 + Math.random() * 90 };
    P.C = { x: 360 + Math.random() * 150, y: 330 + Math.random() * 90 };
    P.D = { x: 90 + Math.random() * 160, y: 330 + Math.random() * 90 };
    render();
  }

  function revealVerdict() {
    document.getElementById('verdict').style.display = 'inline-block';
    document.getElementById('revealBtn').style.display = 'none';
  }

  render();
</script>
</body>
</html>
